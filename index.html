<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Grillfeier</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --primary:#ff7a18;
  --bg:#f6f7fb;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --shadow:0 8px 20px rgba(0,0,0,0.08);
}

body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background:var(--bg);
  color:var(--text);
}

header {
  position:sticky;
  top:0;
  background:linear-gradient(135deg,#ff7a18,#ffb347);
  color:white;
  padding:16px;
  font-size:20px;
  text-align:center;
  font-weight:600;
  box-shadow:var(--shadow);
}

.container {
  max-width:600px;
  margin:auto;
  padding:15px;
}

/* Card */
.card {
  background:var(--card);
  border-radius:16px;
  padding:16px;
  box-shadow:var(--shadow);
  margin-bottom:15px;
}

/* Inputs */
input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:15px;
}

/* Buttons */
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:white;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform:scale(1.02);
}

/* Item Chips */
.item {
  display:inline-block;
  background:#eef2ff;
  padding:6px 10px;
  border-radius:999px;
  margin:4px;
  font-size:13px;
}

.item button {
  background:none;
  color:#999;
  margin-left:6px;
  padding:0;
  font-size:12px;
}

/* Entry */
.entry {
  background:var(--card);
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
}

.entry-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.name {
  font-weight:600;
  font-size:16px;
}

.meta {
  color:var(--muted);
  font-size:13px;
}

.delete-btn {
  background:#ef4444;
  width:auto;
  padding:6px 10px;
  font-size:13px;
  border-radius:8px;
}

/* Total */
.total {
  text-align:center;
  font-weight:600;
  margin-top:10px;
}
</style>
</head>

<body>

<header>🔥 Grillfeier</header>

<div class="container">

<div class="card">
<input id="inviteCode" placeholder="Einladungs-Code">

<input id="name" placeholder="Name">
<input id="adults" type="number" placeholder="Erwachsene">
<input id="kids" type="number" placeholder="Kinder">

<input id="itemInput" placeholder="Mitbringen">
<button onclick="addItem()">➕ hinzufügen</button>

<div id="itemsPreview"></div>

<input id="userCode" placeholder="Dein Code">
<button onclick="addEntry()">🚀 Eintragen</button>
</div>

<div id="list"></div>
<div class="total" id="total"></div>

</div>

<script>
// 🔴 Firebase Config
const firebaseConfig = {
  apiKey: "DEIN_API_KEY",
  authDomain: "DEIN_PROJECT.firebaseapp.com",
  projectId: "DEIN_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const INVITE_CODE = "GRILL2026";

let items = [];

// ➕ Item hinzufügen
function addItem() {
  if (!itemInput.value) return;
  items.push(itemInput.value);
  itemInput.value = "";
  renderItems();
}

// Vorschau
function renderItems() {
  itemsPreview.innerHTML = items.map((i, idx) =>
    `<span class="item">${i} <button onclick="delItem(${idx})">×</button></span>`
  ).join("");
}

function delItem(i) {
  items.splice(i,1);
  renderItems();
}

// Eintrag speichern
function addEntry() {
  if (inviteCode.value !== INVITE_CODE)
    return alert("Falscher Code");

  if (!name.value) return alert("Name fehlt");

  db.collection("grill").add({
    name: name.value,
    adults: Number(adults.value || 0),
    kids: Number(kids.value || 0),
    items: items,
    userCode: userCode.value
  });

  name.value = adults.value = kids.value = userCode.value = "";
  items = [];
  renderItems();
}

// Löschen
function deleteEntry(id, code) {
  const input = prompt("Dein Code?");
  if (input === code) {
    db.collection("grill").doc(id).delete();
  }
}

// Anzeige
db.collection("grill").onSnapshot(snapshot => {
  list.innerHTML = "";
  let totalA = 0;
  let totalK = 0;

  snapshot.forEach(doc => {
    const d = doc.data();

    list.innerHTML += `
      <div class="entry">
        <div class="entry-header">
          <div>
            <div class="name">${d.name}</div>
            <div class="meta">👨 ${d.adults} | 👶 ${d.kids}</div>
          </div>
          <button class="delete-btn" onclick='deleteEntry("${doc.id}", "${d.userCode}")'>❌</button>
        </div>

        <div>
          ${d.items.map(i => `<span class="item">${i}</span>`).join("")}
        </div>
      </div>
    `;

    totalA += d.adults;
    totalK += d.kids;
  });

  total.innerText = `👥 ${totalA} Erwachsene • ${totalK} Kinder`;
});
</script>

</body>
</html>
