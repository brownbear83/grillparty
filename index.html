<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Grillfeier Planung</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin:0; background:#f0f2f5; }

header {
  background:#ff7b00;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.container {
  padding:15px;
  max-width:600px;
  margin:auto;
}

.card {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input, select {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#ff7b00;
  color:white;
  font-size:16px;
}

.small-btn {
  width:auto;
  padding:5px 10px;
  font-size:14px;
  margin-left:5px;
}

.entry {
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

.Fleisch { background:#ffe5e5; }
.Salat { background:#e6ffe6; }
.Getränke { background:#e6f0ff; }
.Dessert { background:#fff0e6; }
.Sonstiges { background:#f2f2f2; }

.item {
  display:flex;
  justify-content:space-between;
  background:#fff;
  padding:5px;
  margin-top:5px;
  border-radius:6px;
}

.total {
  text-align:center;
  margin-top:15px;
  font-weight:bold;
}
</style>
</head>

<body>

<header>🔥 Grillfeier Planung</header>

<div class="container">

<div class="card">
<input id="name" placeholder="Name">
<input id="adults" type="number" placeholder="Erwachsene">
<input id="kids" type="number" placeholder="Kinder">

<select id="category">
  <option>Fleisch</option>
  <option>Salat</option>
  <option>Getränke</option>
  <option>Dessert</option>
  <option>Sonstiges</option>
</select>

<input id="itemInput" placeholder="Was bringst du mit?">
<button onclick="addItem()">➕ hinzufügen</button>

<div id="itemsPreview"></div>

<input id="code" placeholder="Code (zum Bearbeiten)">
<button onclick="addEntry()">🚀 Eintragen</button>
</div>

<div id="list"></div>

<div class="total" id="total"></div>

</div>

<script>
// 🔴 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "DEIN_API_KEY",
  authDomain: "DEIN_PROJECT.firebaseapp.com",
  projectId: "DEIN_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 📦 Items temporär speichern
let items = [];

// ➕ Item hinzufügen
function addItem() {
  if (!itemInput.value) return;
  items.push(itemInput.value);
  itemInput.value = "";
  renderItems();
}

// 🔄 Vorschau anzeigen
function renderItems() {
  itemsPreview.innerHTML = items.map((item, i) => `
    <div class="item">
      ${item}
      <div>
        <button class="small-btn" onclick="editItem(${i})">✏️</button>
        <button class="small-btn" onclick="deleteItem(${i})">❌</button>
      </div>
    </div>
  `).join("");
}

// ✏️ Item bearbeiten
function editItem(index) {
  const newVal = prompt("Bearbeiten:", items[index]);
  if (newVal) {
    items[index] = newVal;
    renderItems();
  }
}

// ❌ Item löschen
function deleteItem(index) {
  items.splice(index, 1);
  renderItems();
}

// 🚀 Eintrag speichern
function addEntry() {
  if (!name.value) return alert("Name fehlt");

  db.collection("grill").add({
    name: name.value,
    adults: adults.value,
    kids: kids.value,
    category: category.value,
    items: items,
    code: code.value
  });

  name.value = adults.value = kids.value = code.value = "";
  items = [];
  renderItems();
}

// ❌ löschen
function deleteEntry(id, savedCode) {
  const input = prompt("Code?");
  if (input === savedCode) {
    db.collection("grill").doc(id).delete();
  }
}

// ✏️ bearbeiten
function editEntry(id, data) {
  const input = prompt("Code?");
  if (input !== data.code) return;

  const newItem = prompt("Neues Item hinzufügen:");
  if (newItem) {
    data.items.push(newItem);
    db.collection("grill").doc(id).update({ items: data.items });
  }
}

// 🔄 Live Anzeige
db.collection("grill").onSnapshot(snapshot => {
  list.innerHTML = "";
  let totalA = 0;
  let totalK = 0;

  snapshot.forEach(doc => {
    const d = doc.data();

    list.innerHTML += `
      <div class="entry ${d.category}">
        <strong>${d.name}</strong><br>
        👨 ${d.adults || 0} | 👶 ${d.kids || 0}

        <div>
          ${d.items.map(i => `<div class="item">${i}</div>`).join("")}
        </div>

        <button class="small-btn" onclick='editEntry("${doc.id}", ${JSON.stringify(d)})'>➕ Item</button>
        <button class="small-btn" onclick='deleteEntry("${doc.id}", "${d.code}")'>❌</button>
      </div>
    `;

    totalA += Number(d.adults || 0);
    totalK += Number(d.kids || 0);
  });

  total.innerText = `👥 Gesamt: ${totalA} Erwachsene, ${totalK} Kinder`;
});
</script>

</body>
</html>
