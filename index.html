<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Grillfeier Planung</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body { font-family: Arial; margin: 20px; background:#f5f5f5; }
input, button { padding:8px; margin:5px; }
table { border-collapse: collapse; width:100%; background:white; }
th, td { border:1px solid #ccc; padding:10px; text-align:center; }
</style>
</head>

<body>

<h1>🔥 Grillfeier Planung</h1>

<input id="name" placeholder="Name">
<input id="adults" type="number" placeholder="Erwachsene">
<input id="kids" type="number" placeholder="Kinder">
<input id="bring" placeholder="Ich bringe mit">
<button onclick="addEntry()">Hinzufügen</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Erwachsene</th>
<th>Kinder</th>
<th>Mitbringen</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

<h3 id="total"></h3>

<script>
// 🔴 HIER DEINE FIREBASE DATEN EINTRAGEN
const firebaseConfig = {
  apiKey: "DEIN_API_KEY",
  authDomain: "DEIN_PROJECT.firebaseapp.com",
  projectId: "DEIN_PROJECT_ID"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const list = document.getElementById("list");

function addEntry() {
  const name = document.getElementById("name").value;
  const adults = document.getElementById("adults").value;
  const kids = document.getElementById("kids").value;
  const bring = document.getElementById("bring").value;

  if (!name) return alert("Name fehlt");

  db.collection("grill").add({
    name, adults, kids, bring
  });
}

db.collection("grill").onSnapshot(snapshot => {
  list.innerHTML = "";
  let totalA = 0;
  let totalK = 0;

  snapshot.forEach(doc => {
    const d = doc.data();

    list.innerHTML += `
      <tr>
        <td>${d.name}</td>
        <td>${d.adults}</td>
        <td>${d.kids}</td>
        <td>${d.bring}</td>
      </tr>
    `;

    totalA += Number(d.adults || 0);
    totalK += Number(d.kids || 0);
  });

  document.getElementById("total").innerText =
    `Gesamt: ${totalA} Erwachsene, ${totalK} Kinder`;
});
</script>

</body>
</html>
