<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Grillfeier</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --primary:#ff7a18;
  --bg:#f6f7fb;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --shadow:0 8px 20px rgba(0,0,0,0.08);
}

body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background:var(--bg);
}

header {
  background:linear-gradient(135deg,#ff7a18,#ffb347);
  color:white;
  padding:16px;
  text-align:center;
  font-weight:600;
}

.container {
  max-width:700px;
  margin:auto;
  padding:15px;
}

.card {
  background:white;
  padding:16px;
  border-radius:16px;
  box-shadow:var(--shadow);
  margin-bottom:15px;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:white;
  font-weight:600;
}

.item {
  display:inline-block;
  background:#eef2ff;
  padding:6px 10px;
  border-radius:999px;
  margin:4px;
  font-size:13px;
}

.entry {
  background:white;
  padding:14px;
  border-radius:16px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
}

.meta {
  font-size:13px;
  color:var(--muted);
}
</style>
</head>

<body>

<header>🔥 Grillfeier</header>

<div class="container">

<div class="card">
<input id="inviteCode" placeholder="Einladungscode">

<input id="name" placeholder="Name">
<input id="adults" type="number" placeholder="Erwachsene">
<input id="kids" type="number" placeholder="Kinder">

<input id="itemInput" placeholder="Mitbringen">
<button onclick="addItem()">➕ hinzufügen</button>

<div id="itemsPreview"></div>

<button onclick="addEntry()">🚀 Eintragen</button>
</div>

<div class="card">
<h3>👥 Teilnehmer</h3>
<div id="participants"></div>

<h3 style="margin-top:15px;">🍽 Mitbringliste</h3>
<div id="itemsList"></div>
</div>

<div id="list"></div>

</div>

<script>
const firebaseConfig = {
  apiKey: "DEIN_API_KEY",
  authDomain: "DEIN_PROJECT.firebaseapp.com",
  projectId: "DEIN_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items = [];

// Items
function addItem() {
  if (!itemInput.value) return;
  items.push(itemInput.value);
  itemInput.value = "";
  renderItems();
}

function renderItems() {
  itemsPreview.innerHTML = items.map((i, idx) =>
    `<span class="item">${i} <button onclick="delItem(${idx})">×</button></span>`
  ).join("");
}

function delItem(i) {
  items.splice(i,1);
  renderItems();
}

// Eintrag speichern (serverseitige Prüfung!)
function addEntry() {
  if (!name.value) return alert("Name fehlt");

  db.collection("grill").add({
    name: name.value,
    adults: Number(adults.value || 0),
    kids: Number(kids.value || 0),
    items: items,
    inviteCode: inviteCode.value
  }).catch(() => alert("Ungültiger Einladungscode"));

  name.value = adults.value = kids.value = "";
  items = [];
  renderItems();
}

// Anzeige
db.collection("grill").onSnapshot(snapshot => {
  list.innerHTML = "";
  participants.innerHTML = "";
  itemsList.innerHTML = "";

  const itemMap = {};

  snapshot.forEach(doc => {
    const d = doc.data();

    participants.innerHTML += `
      <div class="item">${d.name} (${d.adults}👨 / ${d.kids}👶)</div>
    `;

    d.items.forEach(item => {
      if (!itemMap[item]) itemMap[item] = [];
      itemMap[item].push(d.name);
    });

    list.innerHTML += `
      <div class="entry">
        <strong>${d.name}</strong><br>
        <span class="meta">👨 ${d.adults} | 👶 ${d.kids}</span><br>
        ${d.items.map(i => `<span class="item">${i}</span>`).join("")}
      </div>
    `;
  });

  Object.keys(itemMap).forEach(item => {
    itemsList.innerHTML += `
      <div class="item"><strong>${item}</strong>: ${itemMap[item].join(", ")}</div>
    `;
  });
});
</script>

</body>
</html>
